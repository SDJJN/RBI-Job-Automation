name: RBI Vacancy Monitor

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  rbi-vacancy-workflow:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch RBI Vacancy Page (with headers + retry)
        run: |
          curl -L --retry 5 --retry-delay 5 \
          -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
          -H "Accept: text/html" \
          -H "Connection: keep-alive" \
          https://opportunities.rbi.org.in/scripts/vacancies.aspx \
          -o vacancies.html

      - name: Extract Notification Links
        run: |
          grep -o 'bs_viewcontent.aspx?Id=[0-9]*' vacancies.html | sort -u > links.txt

      - name: Visit Each Notification Page and Extract PDF
        run: |
          > results.txt
          while read link
          do
            FULL_URL="https://opportunities.rbi.org.in/scripts/$link"

            PAGE=$(curl -L --retry 5 \
            -H "User-Agent: Mozilla/5.0" \
            "$FULL_URL")

            PDF=$(echo "$PAGE" | grep -o 'https://rbidocs.rbi.org.in[^"]*PDF')

            echo "Notification Page: $FULL_URL" >> results.txt
            echo "PDF Link: $PDF" >> results.txt
            echo "" >> results.txt

          done < links.txt

      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: RBI Vacancy Notifications
          to: sachin.dhaka.btu@gmail.com
          from: ${{ secrets.EMAIL_USER }}
          body: file://results.txt
