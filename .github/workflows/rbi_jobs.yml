name: RBI Vacancy Monitor

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  rbi-vacancy-workflow:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch RBI Vacancy Page
        run: |
          curl -s https://opportunities.rbi.org.in/scripts/vacancies.aspx -o vacancies.html

      - name: Extract Vacancy Links
        run: |
          grep -o 'bs_viewcontent.aspx?Id=[0-9]*' vacancies.html | sort -u > links.txt

      - name: Extract PDF Links
        run: |
          > results.txt
          while read link; do
            FULL_URL="https://opportunities.rbi.org.in/scripts/$link"
            PAGE=$(curl -s $FULL_URL)
            PDF=$(echo "$PAGE" | grep -o 'https://rbidocs.rbi.org.in[^"]*PDF')
            echo "Notification: $FULL_URL" >> results.txt
            echo "PDF: $PDF" >> results.txt
            echo "" >> results.txt
          done < links.txt

      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: RBI Vacancy Notifications
          to: sachin.dhaka.btu@gmail.com
          from: ${{ secrets.EMAIL_USER }}
          body: file://results.txt
